[app:main]
use = egg:dbviewer

pyramid.reload_templates = true
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false

# Path to SQLite Chinook (run: python scripts/download_chinook.py)
dbviewer.database_url = sqlite:///%(here)s/Chinook_Sqlite.sqlite
# Cap rows returned for interactive use; raise in settings for stress tests.
dbviewer.max_rows = 5000

# Allow browser tabs on another origin (e.g. Vite :5173) to call :6543 directly.
# Turn off behind a real reverse proxy / locked-down deployment.
dbviewer.enable_cors = true

[server:main]
use = egg:waitress#main
listen = localhost:6543
